<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .navbar{
             display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 20px 40px;
    background-color: black;
        }
        .logo h1{
        color: white;
    }
    .nav-links{
            list-style: none;
            display: flex;
            font size:10px;
    }
    .nav-links li{
            margin-left: 20px;
    }
     a{
            text-decoration: none;
            color: white;
}
    . nav-links a{
            color: white;
            text-decoration: none;
            font-size: 18px;

}
.nav-links a:hover{
    color: cyan;
}
.nav button{
display: flex;
gap: 10px;
}
. nav button button{
        padding: 10px 20px;
border: none;
border-radius: 5px;
cursor: pointer;
    font-size: 20px;
    font-family: Arial, Helvetica, sans-serif;
}
.login btn{
    background-color: white;
    color: black;
    font-family: Arial, Helvetica, sans-serif
    padding: 10px 20px;
}
.signup btn{
    background-color: #007bff;
    color: white;
    font-family:Arial, Helvetica, sans-serif
    padding: 10px 20px;
}
}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
        <h1>logo</h1>
        </div>
        <ul class="nav-links">
            <li><a href="">Home</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Services</a></li>
            <li><a href="">Contact</a></li>
        </ul>
        <div class="button">
            <button>Login</button>
            <button> sign up </button>
        </div>
    </nav>
</body>
</html>
